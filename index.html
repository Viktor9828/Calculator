<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ränta på ränta</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e0ddd6;
      --text: #1a1a1a;
      --text-muted: #777;
      --accent: #1D9E75;
      --accent-light: #5DCAA5;
      --accent-2: #0F6E56;
      --radius: 10px;
      --input-bg: #fff;
    }
    body.dark {
      --bg: #161616;
      --surface: #222222;
      --border: #333;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #1D9E75;
      --accent-light: #5DCAA5;
      --accent-2: #0F6E56;
      --input-bg: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      max-width: 820px;
      margin: 0 auto;
      transition: background 0.2s, color 0.2s;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 10px;
    }
    h1 { font-size: 22px; font-weight: 500; }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    select, .toggle-btn {
      background: var(--surface);
      color: var(--text);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-btn { font-size: 13px; }
    .toggle-btn:hover, select:hover { background: var(--border); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 1.5rem;
    }
    .ctrl { display: flex; flex-direction: column; gap: 6px; }
    .ctrl label { font-size: 13px; color: var(--text-muted); }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      min-width: 0;
    }
    .ctrl input[type=number] {
      width: 100px;
      padding: 5px 8px;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text);
      -moz-appearance: textfield;
    }
    .ctrl input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .metric {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      border: 0.5px solid var(--border);
    }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-value { font-size: 17px; font-weight: 500; word-break: break-word; }
    .metric-value.accent { color: var(--accent); }

    .legend { display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 260px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      padding: 1rem;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .metric { display: flex; justify-content: space-between; align-items: center; }
      .metric-label { margin-bottom: 0; }
      .ctrl input[type=number] { width: 85px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 id="title">Ränta på ränta</h1>
    <div class="controls-row">
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="sv">🇸🇪 Svenska</option>
        <option value="en">🇬🇧 English</option>
      </select>
      <select id="currency-select" onchange="setCurrency(this.value)">
        <option value="SEK">SEK – kr</option>
        <option value="EUR">EUR – €</option>
        <option value="USD">USD – $</option>
        <option value="GBP">GBP – £</option>
      </select>
      <button class="toggle-btn" onclick="toggleDark()" id="dark-btn">🌙 Mörkt</button>
    </div>
  </div>

  <div class="grid">
    <div class="ctrl">
      <label id="lbl-principal">Startbelopp</label>
      <div class="ctrl-row">
        <input type="range" id="principal" min="0" max="500000" step="1000" value="10000" oninput="syncFromSlider('principal')">
        <input type="number" id="principal-num" min="0" max="500000" step="1000" value="10000" oninput="syncFromNumber('principal')">
      </div>
    </div>
    <div class="ctrl">
      <label id="lbl-monthly">Månadsinsättning</label>
      <div class="ctrl-row">
        <input type="range" id="monthly" min="0" max="10000" step="100" value="1000" oninput="syncFromSlider('monthly')">
        <input type="number" id="monthly-num" min="0" max="10000" step="100" value="1000" oninput="syncFromNumber('monthly')">
      </div>
    </div>
    <div class="ctrl">
      <label id="lbl-rate">Årsränta (%)</label>
      <div class="ctrl-row">
        <input type="range" id="rate" min="0.5" max="20" step="0.5" value="7" oninput="syncFromSlider('rate')">
        <input type="number" id="rate-num" min="0.5" max="20" step="0.5" value="7" oninput="syncFromNumber('rate')">
      </div>
    </div>
    <div class="ctrl">
      <label id="lbl-years">Antal år</label>
      <div class="ctrl-row">
        <input type="range" id="years" min="1" max="50" step="1" value="20" oninput="syncFromSlider('years')">
        <input type="number" id="years-num" min="1" max="50" step="1" value="20" oninput="syncFromNumber('years')">
      </div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label" id="lbl-final">Slutvärde</div>
      <div class="metric-value" id="final-value">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="lbl-invested">Totalt inbetalt</div>
      <div class="metric-value" id="total-invested">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="lbl-interest">Räntevinst</div>
      <div class="metric-value accent" id="interest-earned">—</div>
    </div>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#0F6E56;"></span><span id="legend-invested">Inbetalt kapital</span></span>
    <span><span class="legend-dot" style="background:#1D9E75;"></span><span id="legend-interest">Räntevinst</span></span>
  </div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const texts = {
      sv: {
        title: 'Ränta på ränta',
        principal: 'Startbelopp',
        monthly: 'Månadsinsättning',
        rate: 'Årsränta (%)',
        years: 'Antal år',
        final: 'Slutvärde',
        invested: 'Totalt inbetalt',
        interest: 'Räntevinst',
        legendInvested: 'Inbetalt kapital',
        legendInterest: 'Räntevinst',
        dark: '🌙 Mörkt',
        light: '☀️ Ljust',
        yearLabel: 'År'
      },
      en: {
        title: 'Compound Interest',
        principal: 'Initial amount',
        monthly: 'Monthly deposit',
        rate: 'Annual rate (%)',
        years: 'Number of years',
        final: 'Final value',
        invested: 'Total invested',
        interest: 'Interest earned',
        legendInvested: 'Invested capital',
        legendInterest: 'Interest earned',
        dark: '🌙 Dark',
        light: '☀️ Light',
        yearLabel: 'Year'
      }
    };

    const currencies = {
      SEK: { symbol: 'kr', position: 'after',  locale: 'sv-SE' },
      EUR: { symbol: '€',  position: 'before', locale: 'de-DE' },
      USD: { symbol: '$',  position: 'before', locale: 'en-US' },
      GBP: { symbol: '£',  position: 'before', locale: 'en-GB' }
    };

    let lang = 'sv';
    let currency = 'SEK';
    let darkMode = false;
    let chart;

    function fmt(n) {
      const c = currencies[currency];
      const num = Math.round(n).toLocaleString(c.locale);
      return c.position === 'after' ? num + ' ' + c.symbol : c.symbol + num;
    }

    function setLang(l) {
      lang = l;
      const t = texts[l];
      document.getElementById('title').textContent = t.title;
      document.getElementById('lbl-principal').textContent = t.principal;
      document.getElementById('lbl-monthly').textContent = t.monthly;
      document.getElementById('lbl-rate').textContent = t.rate;
      document.getElementById('lbl-years').textContent = t.years;
      document.getElementById('lbl-final').textContent = t.final;
      document.getElementById('lbl-invested').textContent = t.invested;
      document.getElementById('lbl-interest').textContent = t.interest;
      document.getElementById('legend-invested').textContent = t.legendInvested;
      document.getElementById('legend-interest').textContent = t.legendInterest;
      document.getElementById('dark-btn').textContent = darkMode ? t.light : t.dark;
      document.documentElement.lang = l;
      update();
    }

    function setCurrency(c) {
      currency = c;
      update();
    }

    function toggleDark() {
      darkMode = !darkMode;
      document.body.classList.toggle('dark', darkMode);
      const t = texts[lang];
      document.getElementById('dark-btn').textContent = darkMode ? t.light : t.dark;
      update();
    }

    function syncFromSlider(id) {
      const val = document.getElementById(id).value;
      document.getElementById(id + '-num').value = val;
      update();
    }

    function syncFromNumber(id) {
      let val = +document.getElementById(id + '-num').value;
      const slider = document.getElementById(id);
      const min = +slider.min;
      const max = +slider.max;
      val = Math.min(Math.max(val, min), max);
      slider.value = val;
      update();
    }

    function calculate(principal, monthly, rate, years) {
      const r = rate / 100 / 12;
      const labels = [], invested = [], total = [];
      for (let y = 0; y <= years; y++) {
        const months = y * 12;
        let fv = r === 0
          ? principal + monthly * months
          : principal * Math.pow(1 + r, months) + monthly * (Math.pow(1 + r, months) - 1) / r;
        labels.push(y === 0 ? 'Start' : texts[lang].yearLabel + ' ' + y);
        invested.push(Math.round(principal + monthly * months));
        total.push(Math.round(fv));
      }
      return { labels, invested, total };
    }

    function update() {
      const principal = +document.getElementById('principal').value;
      const monthly   = +document.getElementById('monthly').value;
      const rate      = +document.getElementById('rate').value;
      const years     = +document.getElementById('years').value;

      const { labels, invested, total } = calculate(principal, monthly, rate, years);
      const finalVal     = total[total.length - 1];
      const totalInv     = invested[invested.length - 1];
      const interest     = finalVal - totalInv;
      const interestData = total.map((v, i) => v - invested[i]);

      document.getElementById('final-value').textContent     = fmt(finalVal);
      document.getElementById('total-invested').textContent  = fmt(totalInv);
      document.getElementById('interest-earned').textContent = fmt(interest);

      const gridColor = darkMode ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
      const tickColor = '#888';

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = invested;
        chart.data.datasets[1].data = interestData;
        chart.options.scales.x.ticks.color = tickColor;
        chart.options.scales.y.ticks.color = tickColor;
        chart.options.scales.y.grid.color  = gridColor;
        chart.options.plugins.tooltip.callbacks.label = ctx =>
          ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw);
        chart.update('none');
      } else {
        chart = new Chart(document.getElementById('chart'), {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label: texts[lang].legendInvested, data: invested,     backgroundColor: '#0F6E56', stack: 'a' },
              { label: texts[lang].legendInterest,  data: interestData, backgroundColor: '#1D9E75', stack: 'a' }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw) }}
            },
            scales: {
              x: { stacked: true, ticks: { autoSkip: true, maxTicksLimit: 10, color: tickColor }, grid: { display: false } },
              y: { stacked: true, ticks: { color: tickColor, callback: v => {
                const c = currencies[currency];
                const num = (v/1000).toFixed(0) + 'k';
                return c.position === 'after' ? num + c.symbol : c.symbol + num;
              }}, grid: { color: gridColor } }
            }
          }
        });
      }
    }

    update();
  </script>
</body>
</html>
