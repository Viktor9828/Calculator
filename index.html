<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ränta på ränta</title>
  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #e0ddd6;
      --text: #1a1a1a; --text-muted: #777;
      --accent: #1D9E75; --accent2: #0F6E56;
      --compare: #c0392b; --compare2: #922b21;
      --radius: 10px; --input-bg: #fff;
    }
    body.dark {
      --bg: #161616; --surface: #222; --border: #333;
      --text: #f0f0f0; --text-muted: #888;
      --accent: #1D9E75; --accent2: #0F6E56;
      --compare: #e74c3c; --compare2: #c0392b;
      --input-bg: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      padding: 1.5rem; max-width: 860px; margin: 0 auto;
      transition: background 0.2s, color 0.2s;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px;
    }
    h1 { font-size: 22px; font-weight: 500; }
    .controls-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    select, .btn {
      background: var(--surface); color: var(--text);
      border: 0.5px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; cursor: pointer; transition: background 0.2s;
    }
    .btn:hover, select:hover { background: var(--border); }
    .scenarios { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 1.5rem; }
    .scenarios.two-col { grid-template-columns: 1fr 1fr; }
    .scenario-box {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
    }
    .scenario-box.s1 { border-top: 3px solid var(--accent); }
    .scenario-box.s2 { border-top: 3px solid var(--compare); }
    .scenario-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .scenario-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .s-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .remove-btn {
      font-size: 12px; color: var(--text-muted); background: none;
      border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .remove-btn:hover { background: var(--border); color: var(--text); }
    .ctrl { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .ctrl:last-child { margin-bottom: 0; }
    .ctrl label { font-size: 12px; color: var(--text-muted); }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl input[type=range] { flex: 1; min-width: 0; accent-color: var(--accent); }
    .s2 .ctrl input[type=range] { accent-color: var(--compare); }
    .num-wrap input[type=text] {
      width: 100px; padding: 5px 8px;
      border: 0.5px solid var(--border); border-radius: 6px;
      font-size: 12px; background: var(--input-bg); color: var(--text); text-align: right;
    }
    .num-wrap input[type=text]:focus { outline: none; border-color: var(--accent); }
    .add-scenario-row { margin-bottom: 1.5rem; }
    .add-btn {
      font-size: 13px; padding: 8px 16px;
      background: var(--surface); border: 0.5px dashed var(--border);
      border-radius: 6px; color: var(--text-muted); cursor: pointer; width: 100%;
      transition: background 0.2s, color 0.2s;
    }
    .add-btn:hover { background: var(--border); color: var(--text); }
    .start-year-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; flex-wrap: wrap;
    }
    .start-year-row label { font-size: 13px; color: var(--text-muted); }
    .start-year-row input[type=text] {
      width: 70px; padding: 4px 8px;
      border: 0.5px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--input-bg); color: var(--text); text-align: right;
    }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.2rem; }
    .metric {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; border: 0.5px solid var(--border);
    }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
    .metric-val-row { display: flex; flex-direction: column; gap: 4px; }
    .metric-val { font-size: 15px; font-weight: 500; display: flex; align-items: baseline; gap: 6px; }
    .metric-val .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
    .metric-val.s1c { color: var(--accent); }
    .metric-val.s2c { color: var(--compare); }
    .real-val {
      font-size: 12px; font-weight: 400; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px; padding-left: 14px;
    }
    .real-val.hidden { display: none; }
    .inflation-section {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 1rem; margin-bottom: 1.2rem;
    }
    .inflation-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .inflation-header-left { display: flex; align-items: center; gap: 10px; }
    .inflation-title { font-size: 13px; font-weight: 500; }
    .inflation-controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .inflation-controls.hidden { display: none; }
    .inflation-controls label { font-size: 13px; color: var(--text-muted); }
    .inflation-controls input[type=range] { width: 140px; accent-color: var(--accent); }
    .inflation-controls input[type=text] {
      width: 60px; padding: 4px 8px;
      border: 0.5px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--input-bg); color: var(--text); text-align: right;
    }
    .inflation-desc { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
    .inflation-desc.hidden { display: none; }
    .switch { position: relative; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-sw {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 20px; cursor: pointer; transition: background 0.2s;
    }
    .slider-sw:before {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 3px; top: 3px;
      background: white; border-radius: 50%; transition: transform 0.2s;
    }
    input:checked + .slider-sw { background: var(--accent); }
    input:checked + .slider-sw:before { transform: translateX(16px); }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-wrap span { font-size: 12px; color: var(--text-muted); }
    .legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-line { width: 18px; height: 2px; flex-shrink: 0; border-top: 2px dashed; }
    .chart-wrap {
      position: relative; width: 100%; height: 280px;
      background: var(--surface); border-radius: var(--radius);
      border: 0.5px solid var(--border); padding: 1rem; margin-bottom: 1rem;
    }
    .disclaimer {
      font-size: 12px; color: var(--text-muted);
      border-top: 0.5px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; line-height: 1.6;
    }
    @media (max-width: 580px) {
      .scenarios.two-col { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .num-wrap input[type=text] { width: 85px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1 id="title">Ränta på ränta</h1>
  <div class="controls-row">
    <select id="lang-select" onchange="setLang(this.value)">
      <option value="sv">🇸🇪 Svenska</option>
      <option value="en">🇬🇧 English</option>
    </select>
    <select id="currency-select" onchange="setCurrency(this.value)">
      <option value="SEK">SEK – kr</option>
      <option value="EUR">EUR – €</option>
      <option value="USD">USD – $</option>
      <option value="GBP">GBP – £</option>
    </select>
    <button class="btn" onclick="toggleDark()" id="dark-btn">🌙 Mörkt</button>
  </div>
</div>

<div class="scenarios" id="scenarios-grid">
  <div class="scenario-box s1">
    <div class="scenario-header">
      <div class="scenario-title"><span class="s-dot" style="background:var(--accent)"></span><span id="s1-title">Scenario 1</span></div>
    </div>
    <div class="ctrl"><label id="lbl-principal">Startbelopp</label>
      <div class="ctrl-row">
        <input type="range" id="s1-principal" min="0" max="500000" step="1000" value="10000" oninput="syncSlider('s1','principal')">
        <div class="num-wrap"><input type="text" id="s1-principal-num" value="10 000" onblur="syncText('s1','principal')" onkeydown="if(event.key==='Enter')syncText('s1','principal')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-monthly">Månadsinsättning</label>
      <div class="ctrl-row">
        <input type="range" id="s1-monthly" min="0" max="10000" step="100" value="1000" oninput="syncSlider('s1','monthly')">
        <div class="num-wrap"><input type="text" id="s1-monthly-num" value="1 000" onblur="syncText('s1','monthly')" onkeydown="if(event.key==='Enter')syncText('s1','monthly')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-rate">Årsränta (%)</label>
      <div class="ctrl-row">
        <input type="range" id="s1-rate" min="0.5" max="20" step="0.5" value="7" oninput="syncSlider('s1','rate')">
        <div class="num-wrap"><input type="text" id="s1-rate-num" value="7,0" onblur="syncText('s1','rate')" onkeydown="if(event.key==='Enter')syncText('s1','rate')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-years">Antal år</label>
      <div class="ctrl-row">
        <input type="range" id="s1-years" min="1" max="50" step="1" value="20" oninput="syncSlider('s1','years')">
        <div class="num-wrap"><input type="text" id="s1-years-num" value="20" onblur="syncText('s1','years')" onkeydown="if(event.key==='Enter')syncText('s1','years')"></div>
      </div>
    </div>
  </div>

  <div class="scenario-box s2" id="s2-box" style="display:none">
    <div class="scenario-header">
      <div class="scenario-title"><span class="s-dot" style="background:var(--compare)"></span><span id="s2-title">Scenario 2</span></div>
      <button class="remove-btn" onclick="removeScenario()">✕ <span id="remove-lbl">Ta bort</span></button>
    </div>
    <div class="ctrl"><label id="lbl-principal2">Startbelopp</label>
      <div class="ctrl-row">
        <input type="range" id="s2-principal" min="0" max="500000" step="1000" value="10000" oninput="syncSlider('s2','principal')">
        <div class="num-wrap"><input type="text" id="s2-principal-num" value="10 000" onblur="syncText('s2','principal')" onkeydown="if(event.key==='Enter')syncText('s2','principal')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-monthly2">Månadsinsättning</label>
      <div class="ctrl-row">
        <input type="range" id="s2-monthly" min="0" max="10000" step="100" value="1000" oninput="syncSlider('s2','monthly')">
        <div class="num-wrap"><input type="text" id="s2-monthly-num" value="1 000" onblur="syncText('s2','monthly')" onkeydown="if(event.key==='Enter')syncText('s2','monthly')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-rate2">Årsränta (%)</label>
      <div class="ctrl-row">
        <input type="range" id="s2-rate" min="0.5" max="20" step="0.5" value="10" oninput="syncSlider('s2','rate')">
        <div class="num-wrap"><input type="text" id="s2-rate-num" value="10,0" onblur="syncText('s2','rate')" onkeydown="if(event.key==='Enter')syncText('s2','rate')"></div>
      </div>
    </div>
    <div class="ctrl"><label id="lbl-years2">Antal år</label>
      <div class="ctrl-row">
        <input type="range" id="s2-years" min="1" max="50" step="1" value="20" oninput="syncSlider('s2','years')">
        <div class="num-wrap"><input type="text" id="s2-years-num" value="20" onblur="syncText('s2','years')" onkeydown="if(event.key==='Enter')syncText('s2','years')"></div>
      </div>
    </div>
  </div>
</div>

<div class="add-scenario-row" id="add-row">
  <button class="add-btn" onclick="addScenario()" id="add-btn">+ Jämför med scenario 2</button>
</div>

<div class="start-year-row">
  <label id="lbl-startyear">Startår:</label>
  <input type="text" id="start-year" value="2025" onblur="update()" onkeydown="if(event.key==='Enter')update()">
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label" id="lbl-final">Slutvärde</div>
    <div class="metric-val-row">
      <div class="metric-val s1c"><span class="dot" style="background:var(--accent)"></span><span id="s1-final">—</span></div>
      <div class="real-val hidden" id="s1-final-real"><span id="real-lbl-1">↓ realt:</span> <span id="s1-final-real-val">—</span></div>
      <div class="metric-val s2c" id="s2-final-row" style="display:none"><span class="dot" style="background:var(--compare)"></span><span id="s2-final">—</span></div>
      <div class="real-val hidden" id="s2-final-real"><span id="real-lbl-2">↓ realt:</span> <span id="s2-final-real-val">—</span></div>
    </div>
  </div>
  <div class="metric">
    <div class="metric-label" id="lbl-invested">Totalt inbetalt</div>
    <div class="metric-val-row">
      <div class="metric-val s1c"><span class="dot" style="background:var(--accent)"></span><span id="s1-invested">—</span></div>
      <div class="metric-val s2c" id="s2-invested-row" style="display:none"><span class="dot" style="background:var(--compare)"></span><span id="s2-invested">—</span></div>
    </div>
  </div>
  <div class="metric">
    <div class="metric-label" id="lbl-interest">Räntevinst</div>
    <div class="metric-val-row">
      <div class="metric-val s1c"><span class="dot" style="background:var(--accent)"></span><span id="s1-interest">—</span></div>
      <div class="real-val hidden" id="s1-interest-real"><span id="real-lbl-3">↓ realt:</span> <span id="s1-interest-real-val">—</span></div>
      <div class="metric-val s2c" id="s2-interest-row" style="display:none"><span class="dot" style="background:var(--compare)"></span><span id="s2-interest">—</span></div>
      <div class="real-val hidden" id="s2-interest-real"><span id="real-lbl-4">↓ realt:</span> <span id="s2-interest-real-val">—</span></div>
    </div>
  </div>
</div>

<div class="inflation-section">
  <div class="inflation-header">
    <div class="inflation-header-left">
      <span class="inflation-title" id="infl-title">Inflationspåverkan</span>
      <label class="toggle-wrap">
        <span id="infl-off-lbl">Av</span>
        <label class="switch">
          <input type="checkbox" id="inflation-toggle" onchange="toggleInflation()">
          <span class="slider-sw"></span>
        </label>
        <span id="infl-on-lbl">På</span>
      </label>
    </div>
  </div>
  <div class="inflation-controls hidden" id="inflation-controls">
    <label id="lbl-inflation">Inflationstakt (%):</label>
    <input type="range" id="inflation" min="0" max="10" step="0.5" value="2" oninput="syncInflation()">
    <input type="text" id="inflation-num" value="2,0" onblur="syncInflationText()" onkeydown="if(event.key==='Enter')syncInflationText()">
  </div>
  <div class="inflation-desc hidden" id="inflation-desc"></div>
</div>

<div class="legend" id="legend">
  <span><span class="legend-dot" style="background:#0F6E56"></span><span id="leg-s1-inv">S1 Inbetalt</span></span>
  <span><span class="legend-dot" style="background:#1D9E75"></span><span id="leg-s1-int">S1 Räntevinst</span></span>
  <span id="leg-s2-inv-wrap" style="display:none"><span class="legend-dot" style="background:#922b21"></span><span id="leg-s2-inv">S2 Inbetalt</span></span>
  <span id="leg-s2-int-wrap" style="display:none"><span class="legend-dot" style="background:#c0392b"></span><span id="leg-s2-int">S2 Räntevinst</span></span>
  <span id="leg-real-s1-wrap" style="display:none"><span class="legend-line" style="border-color:#f0a500"></span><span id="leg-real-s1">S1 Realt värde</span></span>
  <span id="leg-real-s2-wrap" style="display:none"><span class="legend-line" style="border-color:#8e44ad"></span><span id="leg-real-s2">S2 Realt värde</span></span>
</div>
<div class="chart-wrap"><canvas id="chart"></canvas></div>
<p class="disclaimer" id="disclaimer"></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const T = {
  sv: {
    title:'Ränta på ränta', s1:'Scenario 1', s2:'Scenario 2',
    addBtn:'+ Jämför med scenario 2', removeLbl:'Ta bort',
    principal:'Startbelopp', monthly:'Månadsinsättning', rate:'Årsränta (%)', years:'Antal år',
    final:'Slutvärde', invested:'Totalt inbetalt', interest:'Räntevinst',
    startyear:'Startår:', inflTitle:'Inflationspåverkan',
    inflOff:'Av', inflOn:'På', inflLabel:'Inflationstakt (%):',
    realLbl:'↓ realt:',
    inflDesc:'Pengars köpkraft minskar över tid på grund av inflation. Den streckade linjen i grafen visar det reala värdet – vad ditt kapital faktiskt är värt i dagens penningvärde. Vid {rate}% inflation per år är {nominal} om {years} år värt ungefär {real} i dagens penningvärde.',
    dark:'🌙 Mörkt', light:'☀️ Ljust',
    legS1inv:'S1 Inbetalt', legS1int:'S1 Räntevinst',
    legS2inv:'S2 Inbetalt', legS2int:'S2 Räntevinst',
    legRealS1:'S1 Realt värde', legRealS2:'S2 Realt värde',
    disclaimer:'Observera: Beräkningarna baseras enbart på den inmatade informationen och utgör inte någon garanti för faktisk avkastning. Investeringar innebär alltid risk och historisk avkastning är ingen garanti för framtida resultat. Konsultera en licensierad finansiell rådgivare innan du fattar investeringsbeslut.'
  },
  en: {
    title:'Compound Interest', s1:'Scenario 1', s2:'Scenario 2',
    addBtn:'+ Compare with scenario 2', removeLbl:'Remove',
    principal:'Initial amount', monthly:'Monthly deposit', rate:'Annual rate (%)', years:'Number of years',
    final:'Final value', invested:'Total invested', interest:'Interest earned',
    startyear:'Start year:', inflTitle:'Inflation impact',
    inflOff:'Off', inflOn:'On', inflLabel:'Inflation rate (%):',
    realLbl:'↓ real:',
    inflDesc:'The purchasing power of money decreases over time due to inflation. The dashed line in the chart shows the real value — what your capital is actually worth in today\'s money. At {rate}% annual inflation, {nominal} in {years} years is worth approximately {real} in today\'s money.',
    dark:'🌙 Dark', light:'☀️ Light',
    legS1inv:'S1 Invested', legS1int:'S1 Interest',
    legS2inv:'S2 Invested', legS2int:'S2 Interest',
    legRealS1:'S1 Real value', legRealS2:'S2 Real value',
    disclaimer:'Disclaimer: All calculations are based solely on the values you have entered and do not constitute a guarantee of actual returns. All investments carry risk and past performance is not indicative of future results. Please consult a licensed financial advisor before making investment decisions.'
  }
};

const currencies = {
  SEK:{ symbol:'kr', position:'after',  locale:'sv-SE' },
  EUR:{ symbol:'€',  position:'before', locale:'de-DE' },
  USD:{ symbol:'$',  position:'before', locale:'en-US' },
  GBP:{ symbol:'£',  position:'before', locale:'en-GB' }
};
const cfg = {
  principal:{ min:0, max:500000, step:1000, dec:0 },
  monthly:  { min:0, max:10000,  step:100,  dec:0 },
  rate:     { min:0.5, max:20,   step:0.5,  dec:1 },
  years:    { min:1, max:50,     step:1,    dec:0 }
};

let lang='sv', currency='SEK', darkMode=false, showS2=false, inflationOn=false, chart;

function fmt(n) {
  const c = currencies[currency];
  const num = Math.round(n).toLocaleString(c.locale);
  return c.position==='after' ? num+' '+c.symbol : c.symbol+num;
}
function fmtField(field, val) {
  if (field==='rate') return parseFloat(val).toFixed(1).replace('.',',');
  if (field==='years') return String(Math.round(val));
  return Math.round(val).toLocaleString('sv-SE');
}
function parseField(str) { return parseFloat(str.replace(/\s/g,'').replace(',','.')) || 0; }

function syncSlider(sc, field) {
  const val = +document.getElementById(sc+'-'+field).value;
  document.getElementById(sc+'-'+field+'-num').value = fmtField(field, val);
  update();
}
function syncText(sc, field) {
  const c = cfg[field];
  let val = parseField(document.getElementById(sc+'-'+field+'-num').value);
  val = Math.min(Math.max(val, c.min), c.max);
  document.getElementById(sc+'-'+field).value = val;
  document.getElementById(sc+'-'+field+'-num').value = fmtField(field, val);
  update();
}
function syncInflation() {
  const val = +document.getElementById('inflation').value;
  document.getElementById('inflation-num').value = val.toFixed(1).replace('.',',');
  update();
}
function syncInflationText() {
  let val = parseField(document.getElementById('inflation-num').value);
  val = Math.min(Math.max(val,0),10);
  document.getElementById('inflation').value = val;
  document.getElementById('inflation-num').value = val.toFixed(1).replace('.',',');
  update();
}
function addScenario() {
  showS2 = true;
  document.getElementById('s2-box').style.display = '';
  document.getElementById('add-row').style.display = 'none';
  document.getElementById('scenarios-grid').classList.add('two-col');
  ['s2-final-row','s2-invested-row','s2-interest-row'].forEach(id => document.getElementById(id).style.display='');
  ['leg-s2-inv-wrap','leg-s2-int-wrap'].forEach(id => document.getElementById(id).style.display='');
  update();
}
function removeScenario() {
  showS2 = false;
  document.getElementById('s2-box').style.display = 'none';
  document.getElementById('add-row').style.display = '';
  document.getElementById('scenarios-grid').classList.remove('two-col');
  ['s2-final-row','s2-invested-row','s2-interest-row'].forEach(id => document.getElementById(id).style.display='none');
  ['leg-s2-inv-wrap','leg-s2-int-wrap','leg-real-s2-wrap'].forEach(id => document.getElementById(id).style.display='none');
  update();
}
function toggleInflation() {
  inflationOn = document.getElementById('inflation-toggle').checked;
  document.getElementById('inflation-controls').classList.toggle('hidden', !inflationOn);
  document.getElementById('inflation-desc').classList.toggle('hidden', !inflationOn);
  update();
}
function getVal(sc, field) { return +document.getElementById(sc+'-'+field).value; }

function calculate(principal, monthly, rate, years) {
  const r = rate/100/12;
  const inv=[], total=[];
  for (let y=0; y<=years; y++) {
    const m = y*12;
    let fv = r===0 ? principal+monthly*m : principal*Math.pow(1+r,m)+monthly*(Math.pow(1+r,m)-1)/r;
    inv.push(Math.round(principal+monthly*m));
    total.push(Math.round(fv));
  }
  return {inv, total};
}
function realArr(totalArr, inflRate) {
  return totalArr.map((v, y) => Math.round(v / Math.pow(1+inflRate/100, y)));
}
function updateInflDesc(inflRate, years) {
  if (!inflationOn) return;
  let desc = T[lang].inflDesc;
  desc = desc
    .replace('{rate}', inflRate.toFixed(1).replace('.',','))
    .replace('{nominal}', fmt(1000000))
    .replace('{years}', years)
    .replace('{real}', fmt(Math.round(1000000/Math.pow(1+inflRate/100,years))));
  document.getElementById('inflation-desc').textContent = desc;
}

function setLang(l) {
  lang = l;
  const t = T[l];
  document.getElementById('title').textContent = t.title;
  document.getElementById('s1-title').textContent = t.s1;
  document.getElementById('s2-title').textContent = t.s2;
  document.getElementById('add-btn').textContent = t.addBtn;
  document.getElementById('remove-lbl').textContent = t.removeLbl;
  ['principal','monthly','rate','years'].forEach(f => {
    document.getElementById('lbl-'+f).textContent = t[f];
    document.getElementById('lbl-'+f+'2').textContent = t[f];
  });
  document.getElementById('lbl-final').textContent = t.final;
  document.getElementById('lbl-invested').textContent = t.invested;
  document.getElementById('lbl-interest').textContent = t.interest;
  document.getElementById('lbl-startyear').textContent = t.startyear;
  document.getElementById('infl-title').textContent = t.inflTitle;
  document.getElementById('infl-off-lbl').textContent = t.inflOff;
  document.getElementById('infl-on-lbl').textContent = t.inflOn;
  document.getElementById('lbl-inflation').textContent = t.inflLabel;
  document.getElementById('dark-btn').textContent = darkMode ? t.light : t.dark;
  document.getElementById('leg-s1-inv').textContent = t.legS1inv;
  document.getElementById('leg-s1-int').textContent = t.legS1int;
  document.getElementById('leg-s2-inv').textContent = t.legS2inv;
  document.getElementById('leg-s2-int').textContent = t.legS2int;
  document.getElementById('leg-real-s1').textContent = t.legRealS1;
  document.getElementById('leg-real-s2').textContent = t.legRealS2;
  document.getElementById('disclaimer').textContent = t.disclaimer;
  ['real-lbl-1','real-lbl-2','real-lbl-3','real-lbl-4'].forEach(id =>
    document.getElementById(id).textContent = t.realLbl);
  document.documentElement.lang = l;
  update();
}
function setCurrency(c) { currency=c; update(); }
function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-btn').textContent = darkMode ? T[lang].light : T[lang].dark;
  update();
}

function update() {
  const startYear = parseInt(document.getElementById('start-year').value)||2025;
  const inflRate  = +document.getElementById('inflation').value;
  const s1 = { p:getVal('s1','principal'), m:getVal('s1','monthly'), r:getVal('s1','rate'), y:getVal('s1','years') };
  const s2 = { p:getVal('s2','principal'), m:getVal('s2','monthly'), r:getVal('s2','rate'), y:getVal('s2','years') };
  const r1 = calculate(s1.p, s1.m, s1.r, s1.y);
  const r2 = calculate(s2.p, s2.m, s2.r, s2.y);
  const maxYears = showS2 ? Math.max(s1.y, s2.y) : s1.y;
  const labels = [];
  for (let y=0; y<=maxYears; y++) labels.push(String(startYear+y));
  function pad(arr, len) { const o=[...arr]; while(o.length<=len) o.push(o[o.length-1]); return o; }
  const inv1=pad(r1.inv,maxYears), tot1=pad(r1.total,maxYears);
  const inv2=pad(r2.inv,maxYears), tot2=pad(r2.total,maxYears);
  const int1=tot1.map((v,i)=>v-inv1[i]);
  const int2=tot2.map((v,i)=>v-inv2[i]);
  const real1=realArr(tot1,inflRate);
  const real2=realArr(tot2,inflRate);
  const finalS1=tot1[s1.y], realS1=real1[s1.y];
  const finalS2=tot2[s2.y], realS2=real2[s2.y];
  const intS1=int1[s1.y], intS2=int2[s2.y];
  const realIntS1=Math.round(realS1-inv1[s1.y]);
  const realIntS2=Math.round(realS2-inv2[s2.y]);

  document.getElementById('s1-final').textContent    = fmt(finalS1);
  document.getElementById('s2-final').textContent    = fmt(finalS2);
  document.getElementById('s1-invested').textContent = fmt(inv1[s1.y]);
  document.getElementById('s2-invested').textContent = fmt(inv2[s2.y]);
  document.getElementById('s1-interest').textContent = fmt(intS1);
  document.getElementById('s2-interest').textContent = fmt(intS2);

  ['s1-final-real','s2-final-real','s1-interest-real','s2-interest-real'].forEach(id =>
    document.getElementById(id).classList.toggle('hidden', !inflationOn));
  if (!showS2) {
    ['s2-final-real','s2-interest-real'].forEach(id => document.getElementById(id).classList.add('hidden'));
  }
  document.getElementById('s1-final-real-val').textContent    = fmt(realS1);
  document.getElementById('s2-final-real-val').textContent    = fmt(realS2);
  document.getElementById('s1-interest-real-val').textContent = fmt(realIntS1);
  document.getElementById('s2-interest-real-val').textContent = fmt(realIntS2);

  document.getElementById('leg-real-s1-wrap').style.display = inflationOn ? '' : 'none';
  document.getElementById('leg-real-s2-wrap').style.display = (inflationOn && showS2) ? '' : 'none';

  updateInflDesc(inflRate, s1.y);

  const gridColor = darkMode ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  const tickColor = '#888';
  const t = T[lang];

  const datasets = [
    { label:t.legS1inv, data:inv1, backgroundColor:'#0F6E56', stack:'s1', type:'bar' },
    { label:t.legS1int, data:int1, backgroundColor:'#1D9E75', stack:'s1', type:'bar' }
  ];
  if (showS2) {
    datasets.push({ label:t.legS2inv, data:inv2, backgroundColor:'#922b21', stack:'s2', type:'bar' });
    datasets.push({ label:t.legS2int, data:int2, backgroundColor:'#c0392b', stack:'s2', type:'bar' });
  }
  if (inflationOn) {
    datasets.push({
      label:t.legRealS1, data:real1, type:'line',
      borderColor:'#f0a500', borderWidth:2, borderDash:[5,4],
      pointRadius:0, pointHoverRadius:4, fill:false, tension:0.3,
      backgroundColor:'transparent'
    });
    if (showS2) {
      datasets.push({
        label:t.legRealS2, data:real2, type:'line',
        borderColor:'#8e44ad', borderWidth:2, borderDash:[5,4],
        pointRadius:0, pointHoverRadius:4, fill:false, tension:0.3,
        backgroundColor:'transparent'
      });
    }
  }

  const tooltipLabel = ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw);

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets = datasets;
    chart.options.scales.y.grid.color = gridColor;
    chart.options.plugins.tooltip.callbacks.label = tooltipLabel;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('chart'), {
      type:'bar',
      data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ display:false },
          tooltip:{ mode:'index', intersect:false, callbacks:{ label:tooltipLabel }}
        },
        scales:{
          x:{ stacked:true, ticks:{ autoSkip:true, maxTicksLimit:12, color:tickColor }, grid:{ display:false }},
          y:{ stacked:true, ticks:{ color:tickColor, callback: v => {
            const c=currencies[currency];
            const num=(v/1000).toFixed(0)+'k';
            return c.position==='after' ? num+c.symbol : c.symbol+num;
          }}, grid:{ color:gridColor }}
        }
      }
    });
  }
}

document.getElementById('disclaimer').textContent = T[lang].disclaimer;
update();
</script>
